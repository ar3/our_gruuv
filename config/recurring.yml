production:
  daily_refresh_slack_identities:
    class: DailyRefreshSlackIdentitiesJob
    queue: default
    schedule: at 5am every day

  daily_operational_cleanup:
    class: DailyOperationalCleanupJob
    queue: default
    schedule: at 5am every day

  daily_refresh_observation_health_caches:
    class: DailyRefreshObservationHealthCachesJob
    queue: default
    schedule: at 5am every day

  daily_refresh_engagement_health_statuses:
    class: DailyRefreshEngagementHealthStatusesJob
    queue: default
    schedule: at 5am every day

  snapshot_engagement_health_weekly_rollups:
    class: SnapshotEngagementHealthWeeklyRollupsJob
    queue: default
    schedule: at 5:30am every day

  schedule_gsd_digests:
    class: Digest::ScheduleDigestsJob
    queue: default
    schedule: every hour

  schedule_about_me_digests:
    class: Digest::ScheduleAboutMeJob
    queue: default
    schedule: every hour

  schedule_interesting_things_digests:
    class: Digest::ScheduleInterestingThingsJob
    queue: default
    schedule: every hour

  check_in_health_cache_process_schedules:
    class: CheckInHealthCacheProcessSchedulesJob
    queue: default
    schedule: every 1 minute
