production:
  daily_operational_cleanup:
    class: DailyOperationalCleanupJob
    queue: default
    schedule: at 5am every day

  schedule_gsd_digests:
    class: Digest::ScheduleDigestsJob
    queue: default
    schedule: every hour

  check_in_health_cache_process_schedules:
    class: CheckInHealthCacheProcessSchedulesJob
    queue: default
    schedule: every 1 minute
